services:
  api:
    build: .
    command: sh -c "alembic upgrade head && uvicorn yt_clipper.main:create_app --factory --host 0.0.0.0 --port 8000"
    env_file: ${ENV_FILE:-.env.example}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ${DOWNLOADS_HOST_DIR:-./downloads}:${STORAGE_DIR:-/app/downloads}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A yt_clipper.worker.celery_app worker --loglevel=info
    env_file: ${ENV_FILE:-.env.example}
    volumes:
      - ${DOWNLOADS_HOST_DIR:-./downloads}:${STORAGE_DIR:-/app/downloads}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ytclipper}
      POSTGRES_USER: ${POSTGRES_USER:-ytclipper}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ytclipper}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
